<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カメラ起動テスト</title>
<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:#000;color:#fff;font-family:sans-serif;
}
#start{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;padding:24px;
  background:#111;z-index:10;
}
button{
  padding:14px 24px;border:none;border-radius:10px;
  background:#2563eb;color:#fff;font-size:16px;font-weight:700;
}
#msg{
  font-size:14px;line-height:1.7;text-align:center;max-width:320px;
  white-space:pre-wrap;
}
#video{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;background:#000;
}
</style>
</head>
<body>

<div id="start">
  <h2>カメラ起動テスト</h2>
  <button id="btn">カメラを起動する</button>
  <div id="msg">ボタンを押してください</div>
</div>

<video id="video" playsinline autoplay muted></video>

<script>
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');
const video = document.getElementById('video');
let stream = null;

function setMsg(text) {
  msg.textContent = text;
}

async function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => {
      try { track.stop(); } catch (e) {}
    });
    stream = null;
  }
  video.srcObject = null;
}

async function startCamera() {
  await stopCamera();
  setMsg('カメラを起動中...');

  try {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { exact: 'environment' }
        },
        audio: false
      });
      setMsg('背面カメラで起動しました');
    } catch (e1) {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });
      setMsg('通常カメラで起動しました');
    }

    video.srcObject = stream;
    await video.play();
  } catch (e) {
    setMsg(
      '起動失敗\n' +
      'name: ' + (e.name || '') + '\n' +
      'message: ' + (e.message || String(e))
    );
  }
}

btn.addEventListener('click', startCamera);

window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
